<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="940" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD15C"/>
      <stop offset="0.5" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF5E5B"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="300" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF2FF" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sq"><rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/></clipPath>
  </defs>

  <g clip-path="url(#sq)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>
    <circle cx="512" cy="512" r="330" fill="url(#halo)"/>
    <g filter="url(#glow)">
      <rect x="194" y="446.7" width="60" height="130.6" rx="30" fill="url(#bar)"/>
      <rect x="290" y="393"   width="60" height="238"   rx="30" fill="url(#bar)"/>
      <rect x="386" y="335.5" width="60" height="353"   rx="30" fill="url(#bar)"/>
      <rect x="482" y="320"   width="60" height="384"   rx="30" fill="url(#bar)"/>
      <rect x="578" y="370"   width="60" height="284"   rx="30" fill="url(#bar)"/>
      <rect x="674" y="416"   width="60" height="192"   rx="30" fill="url(#bar)"/>
      <rect x="770" y="450.5" width="60" height="123"   rx="30" fill="url(#bar)"/>
    </g>
  </g>
  <rect x="3" y="3" width="1018" height="1018" rx="227" ry="227" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>
</svg>
